version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: detailly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: detailly
      # Muss zu DB_PASS des Backends passen; aus der Host-ENV erzwungen.
      POSTGRES_PASSWORD: ${DB_PASS:?set-strong-db-pass}
      POSTGRES_DB: detailly
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U detailly']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend - NestJS Single-App (liefert auch das gebaute Frontend aus client/)
  # 'docker compose up --build' ist jetzt baubar; Migrationen laufen via
  # migrationsRun:true beim Backend-Boot.
  backend:
    build:
      # Build-Kontext = Repo-Wurzel, weil das Frontend unter ./frontend liegt
      # und mit ins Image gebaut wird.
      context: .
      dockerfile: backend/Dockerfile
    container_name: detailly_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: detailly
      DB_PASS: ${DB_PASS:?set-strong-db-pass}
      DB_NAME: detailly
      JWT_SECRET: ${JWT_SECRET:?set-strong-jwt-secret}
      # FRONTEND_URL bewusst LEER lassen -> Single-Origin, CORS origin:false
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - detailly_uploads:/app/backend/uploads
      - detailly_private_uploads:/app/backend/private-uploads

volumes:
  postgres_data:
  detailly_uploads:
  detailly_private_uploads:
